name: hng_expense_tracker
description: A premium expense tracker with facial liveness verification.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Formatting
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  uuid: ^4.3.3
  intl: ^0.19.0
  
  # Core Hardware
  camera: ^0.11.0
  permission_handler: ^11.3.1
  
  # The Verification Engine
  google_mlkit_face_detection: ^0.13.1

  # Step 1: Data Persistence (Added)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # Step 1: Code Generation for Hive (Added)
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

  # assets:
  #   - assets/images/